<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painéis & Listas IPTV - OS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #05070e;
            --text-main: #ffffff;
            --text-muted: #a0a5b5;
            --primary-neon: #00f3ff;
            --secondary-neon: #ff00ea;
            --card-bg: rgba(15, 20, 35, 0.4);
            --window-bg: rgba(10, 15, 25, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 100px 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 234, 0.05), transparent 25%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-attachment: fixed;
        }

        /* Typography */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin: 40px 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 2px;
            background: var(--primary-neon);
            box-shadow: 0 0 10px var(--primary-neon);
            border-radius: 2px;
        }

        /* NOVO: Container Grid para 3 em cima e 3 embaixo */
        .grid-container {
            width: 100%;
            max-width: 750px; /* Ajustado para caber 3 cards perfeitamente */
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            justify-items: center;
        }

        /* Responsividade para celulares na Grade */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }

        /* Slider Container original (Mantido apenas para Subir Listas) */
        .slider-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px 10px;
            display: flex;
            gap: 25px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .slider-container::-webkit-scrollbar { height: 6px; }
        .slider-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        .slider-container::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); border-radius: 10px; }
        .slider-container::-webkit-scrollbar-thumb:hover { background: var(--primary-neon); }

        /* Card Design */
        .card {
            width: 200px;
            height: 200px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            scroll-snap-align: center;
            transition: var(--transition-smooth);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            gap: 15px;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 243, 255, 0.5);
            background: rgba(20, 25, 45, 0.6);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.05), 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .card-header {
            width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            transition: var(--transition-smooth);
        }

        .card-header img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            transition: var(--transition-smooth);
        }

        .card:hover .card-header img {
            transform: scale(1.15);
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.4));
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 1.5px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: var(--transition-smooth);
        }

        .card:hover .card-title {
            color: var(--primary-neon);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
        }

        .status-dot {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff66;
        }

        /* =========================================
           GERENCIADOR DE JANELAS E DOCK (BARRA DE TAREFAS)
           ========================================= */
        
        .taskbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            height: 65px;
            background: rgba(10, 15, 25, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px;
            z-index: 99999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .taskbar-item {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .taskbar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .taskbar-item.active {
            color: #fff;
            background: rgba(0, 243, 255, 0.1);
            border-color: rgba(0, 243, 255, 0.3);
        }

        .taskbar-item.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--primary-neon);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary-neon);
        }

        .taskbar-item.minimized {
            opacity: 0.5;
        }

        /* Estilização da Janela (Modal) */
        .window-modal {
            position: fixed;
            width: 900px;
            height: 650px;
            max-width: 95vw;
            max-height: calc(100vh - 120px);
            background: var(--window-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s, border-radius 0.3s;
            top: 50%;
            left: 50%;
            animation: windowOpen 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes windowOpen {
            from { transform: translate(-50%, -40%) scale(0.9); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .window-modal.maximized {
            top: 0 !important; left: 0 !important; transform: none !important;
            width: 100vw !important; height: 100vh !important; border-radius: 0;
            animation: none;
        }

        .window-header {
            height: 50px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            cursor: grab;
        }
        .window-header:active { cursor: grabbing; }

        .window-title {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 1px;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .window-controls { display: flex; gap: 8px; }
        .window-controls button {
            width: 14px; height: 14px;
            border: none; border-radius: 50%;
            cursor: pointer; transition: 0.2s;
            display: flex; justify-content: center; align-items: center;
            font-size: 0;
        }
        
        .btn-close { background: #ff5f56; }
        .btn-close:hover { background: #ff3b30; box-shadow: 0 0 8px #ff5f56; }
        
        .btn-min { background: #ffbd2e; }
        .btn-min:hover { background: #f39c12; box-shadow: 0 0 8px #ffbd2e; }
        
        .btn-max { background: #27c93f; }
        .btn-max:hover { background: #1abc9c; box-shadow: 0 0 8px #27c93f; }

        .window-body { flex: 1; display: flex; flex-direction: column; position: relative; background: #fff; }
        
        .iframe-warning {
            background: rgba(10, 15, 25, 1);
            color: var(--text-muted);
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .iframe-warning a { color: var(--primary-neon); text-decoration: none; font-weight: bold; }
        .iframe-warning a:hover { text-decoration: underline; }

        .window-body iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* Toast notification */
        .toast {
            position: fixed; top: 20px; right: 20px;
            background: rgba(10, 15, 25, 0.9); border-left: 4px solid var(--primary-neon);
            padding: 15px 20px; border-radius: 8px; color: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 999999;
            transform: translateX(120%); transition: transform 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }
        .toast.show { transform: translateX(0); }

    </style>
</head>

    <!-- ================= INTERFACE OS ================= -->
    <div class="taskbar" id="taskbar"></div>
    <div id="window-manager"></div>

    <script>
        // Lógica de Roteamento Inteligente (Smart Router)
        const blockedDomains = [
            'smartone-iptv.com',
            'duplecast.com',
            'iboplayer.com'
        ];

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function handleAppOpen(id, title, url) {
            const isBlocked = blockedDomains.some(domain => url.includes(domain));

            if (isBlocked) {
                showToast(`🛡️ ${title} bloqueia iframes. Abrindo em nova guia segura...`);
                setTimeout(() => {
                    window.open(url, '_blank');
                }, 800);
            } else {
                openOSApp(id, title, url);
            }
        }

        // --- SISTEMA DE JANELAS (MODAIS) ---
        let zIndexCounter = 1000;
        const apps = {};

        function openOSApp(id, title, url) {
            if (apps[id]) {
                restoreWindow(id);
                return;
            }

            zIndexCounter++;

            const win = document.createElement('div');
            win.className = 'window-modal';
            win.id = 'win-' + id;
            win.style.zIndex = zIndexCounter;

            const offset = (Object.keys(apps).length * 20);
            win.style.transform = `translate(calc(-50% + ${offset}px), calc(-50% + ${offset}px))`;

            win.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')">
                    <span class="window-title">💻 ${title}</span>
                    <div class="window-controls">
                        <button class="btn-min" onclick="minimizeWindow('${id}')" title="Minimizar"></button>
                        <button class="btn-max" onclick="maximizeWindow('${id}')" title="Maximizar"></button>
                        <button class="btn-close" onclick="closeWindow('${id}')" title="Fechar"></button>
                    </div>
                </div>
                <div class="window-body">
                    <div class="iframe-warning">
                        Site em branco ou erro de conexão? <a href="${url}" target="_blank">Clique aqui para abrir na web</a>.
                    </div>
                    <iframe src="${url}"></iframe>
                </div>
            `;

            win.addEventListener('mousedown', () => bringToFront(id));
            document.getElementById('window-manager').appendChild(win);

            const tbItem = document.createElement('div');
            tbItem.className = 'taskbar-item active';
            tbItem.id = 'tb-' + id;
            tbItem.innerHTML = `<span>${title}</span>`;
            tbItem.onclick = () => toggleWindow(id);
            document.getElementById('taskbar').appendChild(tbItem);

            apps[id] = { win, tbItem, minimized: false, maximized: false };
        }

        function bringToFront(id) {
            zIndexCounter++;
            apps[id].win.style.zIndex = zIndexCounter;
            Object.values(apps).forEach(app => app.tbItem.classList.remove('active'));
            apps[id].tbItem.classList.add('active');
        }

        function minimizeWindow(id) {
            apps[id].win.style.display = 'none';
            apps[id].minimized = true;
            apps[id].tbItem.classList.add('minimized');
            apps[id].tbItem.classList.remove('active');
        }

        function restoreWindow(id) {
            apps[id].win.style.display = 'flex';
            apps[id].minimized = false;
            apps[id].tbItem.classList.remove('minimized');
            bringToFront(id);
        }

        function toggleWindow(id) {
            if (apps[id].minimized) {
                restoreWindow(id);
            } else if (apps[id].win.style.zIndex != zIndexCounter) {
                bringToFront(id);
            } else {
                minimizeWindow(id);
            }
        }

        function maximizeWindow(id) {
            const win = apps[id].win;
            if (apps[id].maximized) {
                win.classList.remove('maximized');
                apps[id].maximized = false;
            } else {
                win.classList.add('maximized');
                apps[id].maximized = true;
            }
            bringToFront(id);
        }

        function closeWindow(id) {
            apps[id].win.remove();
            apps[id].tbItem.remove();
            delete apps[id];
        }

        // --- SISTEMA DE ARRASTE (DRAG & DROP) ---
        let isDragging = false;
        let currentDragId = null;
        let startX, startY, initialLeft, initialTop;

        function startDrag(e, id) {
            if (e.target.tagName === 'BUTTON' || apps[id].maximized) return;

            isDragging = true;
            currentDragId = id;
            bringToFront(id);

            const win = apps[id].win;
            const rect = win.getBoundingClientRect();
            
            startX = e.clientX;
            startY = e.clientY;
            
            if(win.style.transform) {
                win.style.left = rect.left + 'px';
                win.style.top = rect.top + 'px';
                win.style.transform = 'none';
                win.style.animation = 'none';
            }

            initialLeft = win.offsetLeft;
            initialTop = win.offsetTop;

            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
            
            const iframeShield = document.createElement('div');
            iframeShield.id = 'iframe-shield';
            iframeShield.style.position = 'fixed';
            iframeShield.style.top = '0'; iframeShield.style.left = '0';
            iframeShield.style.width = '100vw'; iframeShield.style.height = '100vh';
            iframeShield.style.zIndex = '999999';
            document.body.appendChild(iframeShield);
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            const win = apps[currentDragId].win;
            win.style.left = (initialLeft + dx) + 'px';
            win.style.top = (initialTop + dy) + 'px';
        }

        function stopDrag() {
            isDragging = false;
            currentDragId = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
            
            const shield = document.getElementById('iframe-shield');
            if(shield) shield.remove();
        }
    </script>

</body>
</html>
