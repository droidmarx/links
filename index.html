<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painéis & Listas IPTV - OS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #05070e;
            --text-main: #ffffff;
            --text-muted: #a0a5b5;
            --primary-neon: #00f3ff;
            --secondary-neon: #ff00ea;
            --card-bg: rgba(15, 20, 35, 0.4);
            --window-bg: rgba(10, 15, 25, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 5px de distância das bordas laterais */
            padding: 20px 5px 100px 5px; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 234, 0.05), transparent 25%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-attachment: fixed;
        }

        /* Typography */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.1rem, 4.5vw, 1.8rem);
            margin: 25px 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            position: relative;
            display: inline-block;
            text-align: center;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 2px;
            background: var(--primary-neon);
            box-shadow: 0 0 10px var(--primary-neon);
            border-radius: 2px;
        }

        /* ==================================================
           DESIGN MOBILE FIRST (Cards Fluidos e Grid Centralizada)
           ================================================== */
           
        .grid-container {
            width: 100%;
            max-width: 550px; /* Limite de largura para não esticar muito no PC */
            display: grid;
            /* minmax(0, 1fr) OBRIGA TODAS AS COLUNAS A TEREM O MESMO TAMANHO, CENTRALIZANDO A GRID */
            grid-template-columns: repeat(3, minmax(0, 1fr)); 
            gap: 8px;
            margin: 0 auto; /* Garante centralização no eixo X */
            padding: 0 5px; /* Espaçamento interno de respiro */
        }

        .slider-container {
            width: 100%;
            max-width: 1200px;
            padding: 10px 5px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .slider-container::-webkit-scrollbar { height: 4px; }
        .slider-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .slider-container::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); border-radius: 10px; }

        /* Card Design Geral - Fluido */
        .card {
            width: 100%;
            aspect-ratio: 1 / 1; /* Quadrado perfeito */
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 6px; 
            cursor: pointer;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: var(--transition-smooth);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            gap: 4px;
        }

        .slider-container .card {
            min-width: 110px;
            max-width: 110px;
            scroll-snap-align: center;
        }

        .card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(0, 243, 255, 0.5);
            background: rgba(20, 25, 45, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(0, 243, 255, 0.05);
        }

        .card-header {
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            padding: 4px;
            transition: var(--transition-smooth);
        }

        .card-header img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: var(--transition-smooth);
        }

        .card:hover .card-header img {
            transform: scale(1.1);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.55rem, 2.5vw, 1rem); 
            line-height: 1.1; /* Melhora leitura em duas linhas */
            color: #fff;
            letter-spacing: 1px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 2px;
            word-wrap: break-word;
            width: 100%; /* Garante que ocupe todo o card para centralizar bem */
        }

        .status-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 5px;
            height: 5px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ff66;
        }

        /* --- AJUSTES PARA TELAS MAIORES (Tablets e PCs) --- */
        @media (min-width: 768px) {
            body { padding: 40px 20px 100px 20px; }
            .grid-container { gap: 20px; max-width: 700px; padding: 10px; }
            .slider-container { gap: 20px; padding: 20px 10px; }
            .card { border-radius: 20px; padding: 15px; gap: 10px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
            .slider-container .card { min-width: 180px; max-width: 180px; }
            .card-header { border-radius: 12px; padding: 10px; }
            .status-dot { top: 12px; right: 12px; width: 8px; height: 8px; }
            .section-title { margin: 40px 0 25px 0; }
        }

        /* =========================================
           GERENCIADOR DE JANELAS E DOCK (OS)
           ========================================= */
        
        .taskbar {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            height: 55px;
            background: rgba(10, 15, 25, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            z-index: 99999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: calc(100vw - 20px);
            max-width: 600px;
            overflow-x: auto;
        }
        .taskbar::-webkit-scrollbar { display: none; }

        .taskbar-item {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .taskbar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .taskbar-item.active {
            color: #fff;
            background: rgba(0, 243, 255, 0.1);
            border-color: rgba(0, 243, 255, 0.3);
        }

        .taskbar-item.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--primary-neon);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary-neon);
        }

        .taskbar-item.minimized { opacity: 0.5; }

        .window-modal {
            position: fixed;
            width: 900px;
            height: 650px;
            max-width: 95vw;
            max-height: calc(100vh - 90px);
            background: var(--window-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s, border-radius 0.3s;
            top: 50%;
            left: 50%;
            animation: windowOpen 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes windowOpen {
            from { transform: translate(-50%, -40%) scale(0.9); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .window-modal.maximized {
            top: 0 !important; left: 0 !important; transform: none !important;
            width: 100vw !important; height: 100vh !important; border-radius: 0;
            animation: none;
        }

        .window-header {
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            cursor: grab;
        }
        .window-header:active { cursor: grabbing; }

        .window-title {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 0.85rem;
            pointer-events: none;
        }

        .window-controls { display: flex; gap: 8px; }
        .window-controls button {
            width: 12px; height: 12px;
            border: none; border-radius: 50%;
            cursor: pointer; transition: 0.2s;
        }
        
        .btn-close { background: #ff5f56; }
        .btn-min { background: #ffbd2e; }
        .btn-max { background: #27c93f; }

        .window-body { flex: 1; display: flex; flex-direction: column; background: #fff; }
        
        .iframe-warning {
            background: rgba(10, 15, 25, 1);
            color: var(--text-muted);
            padding: 6px;
            text-align: center;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .iframe-warning a { color: var(--primary-neon); text-decoration: none; }
        
        .window-body iframe { width: 100%; height: 100%; border: none; background: #fff; }

        .toast {
            position: fixed; top: 15px; right: 15px;
            background: rgba(10, 15, 25, 0.95); border-left: 4px solid var(--primary-neon);
            padding: 12px 15px; border-radius: 6px; color: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 999999;
            transform: translateX(120%); transition: transform 0.3s ease;
            font-size: 0.85rem;
        }
        .toast.show { transform: translateX(0); }

    </style>
</head>

    <!-- ================= INTERFACE OS ================= -->
    <div class="taskbar" id="taskbar"></div>
    <div id="window-manager"></div>

    <script>
        const blockedDomains = ['smartone-iptv.com', 'duplecast.com', 'iboplayer.com'];

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function handleAppOpen(id, title, url) {
            const isBlocked = blockedDomains.some(domain => url.includes(domain));
            if (isBlocked) {
                showToast(`🛡️ ${title} bloqueia iframes. Abrindo em nova guia segura...`);
                setTimeout(() => window.open(url, '_blank'), 800);
            } else {
                openOSApp(id, title, url);
            }
        }

        let zIndexCounter = 1000;
        const apps = {};

        function openOSApp(id, title, url) {
            if (apps[id]) return restoreWindow(id);

            zIndexCounter++;

            const win = document.createElement('div');
            win.className = 'window-modal';
            win.id = 'win-' + id;
            win.style.zIndex = zIndexCounter;

            const offset = (Object.keys(apps).length * 15);
            win.style.transform = `translate(calc(-50% + ${offset}px), calc(-50% + ${offset}px))`;

            win.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')" ontouchstart="startDragMobile(event, '${id}')">
                    <span class="window-title">💻 ${title}</span>
                    <div class="window-controls">
                        <button class="btn-min" onclick="minimizeWindow('${id}')"></button>
                        <button class="btn-max" onclick="maximizeWindow('${id}')"></button>
                        <button class="btn-close" onclick="closeWindow('${id}')"></button>
                    </div>
                </div>
                <div class="window-body">
                    <div class="iframe-warning">
                        Site branco? <a href="${url}" target="_blank">Abrir navegador</a>.
                    </div>
                    <iframe src="${url}"></iframe>
                </div>
            `;

            win.addEventListener('mousedown', () => bringToFront(id));
            win.addEventListener('touchstart', () => bringToFront(id));
            document.getElementById('window-manager').appendChild(win);

            const tbItem = document.createElement('div');
            tbItem.className = 'taskbar-item active';
            tbItem.id = 'tb-' + id;
            tbItem.innerHTML = `<span>${title}</span>`;
            tbItem.onclick = () => toggleWindow(id);
            document.getElementById('taskbar').appendChild(tbItem);

            apps[id] = { win, tbItem, minimized: false, maximized: false };
        }

        function bringToFront(id) {
            zIndexCounter++;
            apps[id].win.style.zIndex = zIndexCounter;
            Object.values(apps).forEach(app => app.tbItem.classList.remove('active'));
            apps[id].tbItem.classList.add('active');
        }

        function minimizeWindow(id) {
            apps[id].win.style.display = 'none';
            apps[id].minimized = true;
            apps[id].tbItem.classList.add('minimized', 'active' ? false : false);
            apps[id].tbItem.classList.remove('active');
        }

        function restoreWindow(id) {
            apps[id].win.style.display = 'flex';
            apps[id].minimized = false;
            apps[id].tbItem.classList.remove('minimized');
            bringToFront(id);
        }

        function toggleWindow(id) {
            if (apps[id].minimized) restoreWindow(id);
            else if (apps[id].win.style.zIndex != zIndexCounter) bringToFront(id);
            else minimizeWindow(id);
        }

        function maximizeWindow(id) {
            const win = apps[id].win;
            if (apps[id].maximized) {
                win.classList.remove('maximized');
                apps[id].maximized = false;
            } else {
                win.classList.add('maximized');
                apps[id].maximized = true;
            }
            bringToFront(id);
        }

        function closeWindow(id) {
            apps[id].win.remove();
            apps[id].tbItem.remove();
            delete apps[id];
        }

        // --- SISTEMA DE ARRASTE (DRAG) ---
        let isDragging = false, currentDragId = null;
        let startX, startY, initialLeft, initialTop;

        function initDrag(clientX, clientY, id, target) {
            if (target.tagName === 'BUTTON' || apps[id].maximized) return;
            isDragging = true;
            currentDragId = id;
            bringToFront(id);

            const win = apps[id].win;
            const rect = win.getBoundingClientRect();
            
            startX = clientX; startY = clientY;
            
            if(win.style.transform) {
                win.style.left = rect.left + 'px'; win.style.top = rect.top + 'px';
                win.style.transform = 'none'; win.style.animation = 'none';
            }
            initialLeft = win.offsetLeft; initialTop = win.offsetTop;
            
            const shield = document.createElement('div');
            shield.id = 'iframe-shield';
            shield.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:999999;';
            document.body.appendChild(shield);
        }

        function startDrag(e, id) {
            initDrag(e.clientX, e.clientY, id, e.target);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
        }

        function startDragMobile(e, id) {
            initDrag(e.touches[0].clientX, e.touches[0].clientY, id, e.target);
            document.addEventListener('touchmove', dragMobile, {passive: false});
            document.addEventListener('touchend', stopDragMobile);
        }

        function drag(e) { processDrag(e.clientX, e.clientY); }
        function dragMobile(e) { e.preventDefault(); processDrag(e.touches[0].clientX, e.touches[0].clientY); }

        function processDrag(clientX, clientY) {
            if (!isDragging) return;
            const win = apps[currentDragId].win;
            win.style.left = (initialLeft + (clientX - startX)) + 'px';
            win.style.top = (initialTop + (clientY - startY)) + 'px';
        }

        function stopDrag() {
            isDragging = false; currentDragId = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
            const shield = document.getElementById('iframe-shield');
            if(shield) shield.remove();
        }

        function stopDragMobile() {
            isDragging = false; currentDragId = null;
            document.removeEventListener('touchmove', dragMobile);
            document.removeEventListener('touchend', stopDragMobile);
            const shield = document.getElementById('iframe-shield');
            if(shield) shield.remove();
        }
    </script>
</body>
</html>
