<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painéis & Listas IPTV - OS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #080a13;
            --text-main: #ffffff;
            --primary-neon: #00f3ff;
            --card-bg: rgba(10, 15, 30, 0.6);
            --window-bg: rgba(15, 20, 35, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita selecionar texto ao arrastar janelas */
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 0 80px 0; /* Padding inferior para a barra de tarefas */
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.1), transparent 50%),
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin: 30px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--primary-neon);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--primary-neon); }
            to { text-shadow: 0 0 15px var(--primary-neon), 0 0 30px var(--primary-neon), 0 0 40px var(--primary-neon); }
        }

        /* Slider Container (Lista Horizontal) - Agora usado em ambas as categorias */
        .slider-container {
            width: 100%;
            max-width: 1100px; /* Ajustado para segurar bem os 4 cards */
            padding: 20px 0 30px 0;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            display: flex;
            gap: 20px; /* Reduzido o espaço entre eles */
            padding-left: 50vw;
            padding-right: 50vw;
            margin-left: -50vw;
            margin-right: -50vw;
        }

        .slider-container::-webkit-scrollbar { height: 8px; }
        .slider-container::-webkit-scrollbar-track { background: rgba(0, 255, 255, 0.05); border-radius: 10px; }
        .slider-container::-webkit-scrollbar-thumb { background: var(--primary-neon); border-radius: 10px; }

        /* Card Design - TAMANHO REDUZIDO para caber 4 na tela */
        .card {
            min-width: 230px; /* Reduzido de 280px para 230px */
            max-width: 230px;
            height: 280px; /* Altura reduzida de 320px para 280px */
            background: var(--card-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 15px;
            padding: 20px 15px; /* Espaçamento interno menor */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            scroll-snap-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg); transition: 0.5s; z-index: 1; pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--primary-neon);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3), inset 0 0 15px rgba(0, 243, 255, 0.1);
        }
        .card:hover::before { left: 150%; }

        .card-header {
            width: 100%; height: 90px; /* Reduzido para caber nos cards menores */
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 2;
        }

        .card-header img {
            max-width: 80%; max-height: 80%; object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); transition: transform 0.4s ease, filter 0.4s ease;
        }

        .card:hover .card-header img {
            transform: scale(1.15); filter: drop-shadow(0 0 15px var(--primary-neon));
        }

        .card-title {
            font-family: 'Orbitron', sans-serif; text-align: center; font-size: 1.1rem; /* Fonte menor */
            color: #fff; letter-spacing: 2px; margin-top: 5px; text-shadow: 0 0 5px rgba(255,255,255,0.5); z-index: 2;
        }

        .btn-acessar {
            display: block; width: 100%; padding: 12px 0; text-align: center; cursor: pointer;
            color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: bold;
            letter-spacing: 1px; background: rgba(0, 243, 255, 0.05); border: 1px solid var(--primary-neon);
            border-radius: 8px; transition: all 0.3s ease; position: relative; overflow: hidden; z-index: 2;
        }

        .btn-acessar::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-neon); z-index: -1; transform: scaleX(0); transform-origin: right; transition: transform 0.3s ease;
        }

        .btn-acessar:hover { color: #000; box-shadow: 0 0 15px var(--primary-neon); }
        .btn-acessar:hover::after { transform: scaleX(1); transform-origin: left; }

        .status-dot {
            position: absolute; top: 12px; right: 12px; width: 8px; height: 8px;
            background-color: #0f0; border-radius: 50%; box-shadow: 0 0 10px #0f0; animation: blink 1.5s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; box-shadow: 0 0 15px #0f0, 0 0 25px #0f0; } }

        /* =========================================
           GERENCIADOR DE JANELAS E BARRA DE TAREFAS
           ========================================= */
        
        .taskbar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60px;
            background: rgba(8, 10, 19, 0.95); border-top: 1px solid var(--primary-neon);
            backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px;
            gap: 15px; z-index: 99999; overflow-x: auto;
        }

        .taskbar-item {
            padding: 10px 20px; background: rgba(0, 243, 255, 0.1); border: 1px solid var(--primary-neon);
            border-radius: 5px; color: #fff; font-family: 'Orbitron', sans-serif; cursor: pointer;
            transition: 0.3s; white-space: nowrap; font-size: 0.9rem;
        }
        .taskbar-item:hover, .taskbar-item.active { background: var(--primary-neon); color: #000; }
        .taskbar-item.minimized { opacity: 0.6; border-style: dashed; }

        .window-modal {
            position: fixed; width: 850px; height: 600px; max-width: 100vw; max-height: calc(100vh - 60px);
            background: var(--window-bg); border: 1px solid var(--primary-neon); border-radius: 12px;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s, border-radius 0.3s;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .window-modal.maximized {
            top: 0 !important; left: 0 !important; transform: none !important;
            width: 100vw !important; height: calc(100vh - 60px) !important; border-radius: 0;
        }

        .window-header {
            height: 45px; background: rgba(0, 0, 0, 0.5); border-bottom: 1px solid var(--primary-neon);
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            cursor: grab;
        }
        .window-header:active { cursor: grabbing; }

        .window-title {
            font-family: 'Orbitron', sans-serif; color: var(--primary-neon); font-size: 1.1rem;
            letter-spacing: 1px; font-weight: bold; pointer-events: none;
        }

        .window-controls { display: flex; gap: 8px; }
        .window-controls button {
            width: 30px; height: 30px; border: none; border-radius: 5px; background: rgba(255,255,255,0.1);
            color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex;
            justify-content: center; align-items: center;
        }
        .window-controls button:hover { background: rgba(255,255,255,0.3); }
        .window-controls .btn-close:hover { background: #ff4757; }

        .window-body { flex: 1; display: flex; flex-direction: column; position: relative; background: #fff; }
        
        .iframe-warning {
            background: #ffeaa7; color: #d63031; padding: 8px; text-align: center; font-size: 0.85rem; font-weight: bold;
        }
        .iframe-warning a { color: #0984e3; text-decoration: underline; }

        .window-body iframe { width: 100%; height: 100%; border: none; }

    </style>
</head>

    <!-- ================= INTERFACE OS ================= -->
    <!-- Barra de Tarefas -->

    <!-- Container do Gerenciador de Janelas -->
    <div id="window-manager"></div>

    <script>
        let zIndexCounter = 1000;
        const apps = {};

        function openApp(id, title, url) {
            // Se o app já estiver aberto, traz pra frente ou restaura
            if (apps[id]) {
                restoreWindow(id);
                return;
            }

            zIndexCounter++;

            // Criação da Janela
            const win = document.createElement('div');
            win.className = 'window-modal';
            win.id = 'win-' + id;
            win.style.zIndex = zIndexCounter;

            // Offset para não criar as janelas 100% sobrepostas umas nas outras
            const offset = (Object.keys(apps).length * 20);
            win.style.transform = `translate(calc(-50% + ${offset}px), calc(-50% + ${offset}px))`;

            win.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <button onclick="minimizeWindow('${id}')" title="Minimizar">_</button>
                        <button onclick="maximizeWindow('${id}')" title="Maximizar">◻</button>
                        <button class="btn-close" onclick="closeWindow('${id}')" title="Fechar">✕</button>
                    </div>
                </div>
                <div class="window-body">
                    <div class="iframe-warning">
                        O site recusou a conexão ou ficou em branco? <a href="${url}" target="_blank">Abra em uma nova guia clicando aqui</a>.
                    </div>
                    <iframe src="${url}"></iframe>
                </div>
            `;

            win.addEventListener('mousedown', () => bringToFront(id));
            document.getElementById('window-manager').appendChild(win);

            // Criação do botão na barra de tarefas
            const tbItem = document.createElement('div');
            tbItem.className = 'taskbar-item active';
            tbItem.id = 'tb-' + id;
            tbItem.innerText = title;
            tbItem.onclick = () => toggleWindow(id);
            document.getElementById('taskbar').appendChild(tbItem);

            apps[id] = { win, tbItem, minimized: false, maximized: false };
        }

        function bringToFront(id) {
            zIndexCounter++;
            apps[id].win.style.zIndex = zIndexCounter;
            
            // Atualiza classe visual na barra de tarefas
            Object.values(apps).forEach(app => app.tbItem.classList.remove('active'));
            apps[id].tbItem.classList.add('active');
        }

        function minimizeWindow(id) {
            apps[id].win.style.display = 'none';
            apps[id].minimized = true;
            apps[id].tbItem.classList.add('minimized');
            apps[id].tbItem.classList.remove('active');
        }

        function restoreWindow(id) {
            apps[id].win.style.display = 'flex';
            apps[id].minimized = false;
            apps[id].tbItem.classList.remove('minimized');
            bringToFront(id);
        }

        function toggleWindow(id) {
            if (apps[id].minimized) {
                restoreWindow(id);
            } else if (apps[id].win.style.zIndex != zIndexCounter) {
                bringToFront(id); // Se não tá minimizada mas tá no fundo, traz pra frente
            } else {
                minimizeWindow(id); // Se já tá no topo, minimiza
            }
        }

        function maximizeWindow(id) {
            const win = apps[id].win;
            if (apps[id].maximized) {
                win.classList.remove('maximized');
                apps[id].maximized = false;
            } else {
                win.classList.add('maximized');
                apps[id].maximized = true;
            }
            bringToFront(id);
        }

        function closeWindow(id) {
            apps[id].win.remove();
            apps[id].tbItem.remove();
            delete apps[id];
        }

        // --- SISTEMA DE ARRASTE (DRAG & DROP) ---
        let isDragging = false;
        let currentDragId = null;
        let startX, startY, initialLeft, initialTop;

        function startDrag(e, id) {
            // Ignora o arrasto se você clicou nos botões de minimizar/maximizar/fechar
            if (e.target.tagName === 'BUTTON' || apps[id].maximized) return;

            isDragging = true;
            currentDragId = id;
            bringToFront(id);

            const win = apps[id].win;
            const rect = win.getBoundingClientRect();
            
            startX = e.clientX;
            startY = e.clientY;
            
            // Remove o transform(translate) para gerenciar posições absolutas limpas e evitar pulos da tela
            if(win.style.transform) {
                win.style.left = rect.left + 'px';
                win.style.top = rect.top + 'px';
                win.style.transform = 'none';
            }

            initialLeft = win.offsetLeft;
            initialTop = win.offsetTop;

            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
            
            // Cria um "escudo" transparente sobre os iframes para que o mouse não se perca durante o arrasto rápido
            const iframeShield = document.createElement('div');
            iframeShield.id = 'iframe-shield';
            iframeShield.style.position = 'fixed';
            iframeShield.style.top = '0'; iframeShield.style.left = '0';
            iframeShield.style.width = '100vw'; iframeShield.style.height = '100vh';
            iframeShield.style.zIndex = '999999';
            document.body.appendChild(iframeShield);
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            const win = apps[currentDragId].win;
            win.style.left = (initialLeft + dx) + 'px';
            win.style.top = (initialTop + dy) + 'px';
        }

        function stopDrag() {
            isDragging = false;
            currentDragId = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
            
            const shield = document.getElementById('iframe-shield');
            if(shield) shield.remove();
        }
    </script>
